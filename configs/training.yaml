# Training configuration for energy-forecast-pt pipeline v8.
#
# Values here mirror the hardcoded defaults that previously lived in
# scripts/retrain.py and src/models/model_registry.py. Edit this file
# (or create a variant copy such as configs/training_quick.yaml) and
# pass ``--config`` to scripts/retrain.py to run a new experiment.
#
# Versioning: commit this file alongside any code changes to keep the
# experiment history auditable via git.

general:
  seed: 42
  log_level: INFO
  experiment_name: retrain_default

data:
  data_path: data/processed/processed_data.parquet
  target: consumption_mw
  # Temporal (train/val/test) split fractions — must sum to <= 1.0.
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  # Columns excluded from the feature matrix (in addition to metadata).
  exclude_columns:
    - timestamp
    - region
    - year

feature_selection:
  enabled: true
  method: permutation_importance
  # Drop features whose absolute Pearson correlation exceeds this value.
  # Tree models handle correlated features natively, so the default keeps
  # everything except near-duplicates.
  correlation_threshold: 0.99
  # Permutation-importance floor — features at/below this score are dropped.
  permutation_threshold: 0.0
  max_features: null  # null = keep all features above permutation_threshold

cv:
  strategy: time_series_split  # "time_series_split" (expanding) or "walk_forward"
  n_folds: 5
  gap: 0
  # Walk-forward specific: fraction of samples used as the sliding window.
  walk_forward_window_frac: 0.6

optuna:
  enabled: true
  n_trials: 30
  # null ⇒ no hard timeout (let all trials run to completion).
  timeout_seconds: 3600
  sampler: tpe           # "tpe" | "random" | "cmaes"
  pruner: median         # "median" | "none" | "hyperband"
  cv_folds: 5            # CV folds used inside the Optuna objective.

models:
  xgboost:
    enabled: true
    search_space:
      n_estimators:
        type: int
        low: 200
        high: 1500
        step: 50
      max_depth:
        type: int
        low: 3
        high: 12
      learning_rate:
        type: float
        low: 0.005
        high: 0.3
        log: true
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.5
        high: 1.0
      min_child_weight:
        type: int
        low: 1
        high: 10
      reg_alpha:
        type: float
        low: 1.0e-8
        high: 10.0
        log: true
      reg_lambda:
        type: float
        low: 1.0e-8
        high: 10.0
        log: true
      gamma:
        type: float
        low: 0.0
        high: 5.0

  lightgbm:
    enabled: true
    search_space:
      n_estimators:
        type: int
        low: 200
        high: 1500
        step: 50
      max_depth:
        type: int
        low: 3
        high: 12
      learning_rate:
        type: float
        low: 0.005
        high: 0.3
        log: true
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.5
        high: 1.0
      min_child_weight:
        type: int
        low: 1
        high: 10
      reg_alpha:
        type: float
        low: 1.0e-8
        high: 10.0
        log: true
      reg_lambda:
        type: float
        low: 1.0e-8
        high: 10.0
        log: true
      num_leaves:
        type: int
        low: 20
        high: 150
      min_data_in_leaf:
        type: int
        low: 5
        high: 100

  catboost:
    enabled: true
    search_space:
      iterations:
        type: int
        low: 200
        high: 1500
        step: 50
      depth:
        type: int
        low: 3
        high: 12
      learning_rate:
        type: float
        low: 0.005
        high: 0.3
        log: true
      l2_leaf_reg:
        type: float
        low: 0.1
        high: 30.0
        log: true
      bagging_temperature:
        type: float
        low: 0.0
        high: 2.0
      random_strength:
        type: float
        low: 0.0
        high: 2.0
      border_count:
        type: int
        low: 32
        high: 255

conformal:
  method: split            # "split" conformal prediction
  calibration_ratio: 0.5   # fraction of validation set held out for calibration
  alpha: 0.1               # ⇒ 1 - alpha = 0.9 ⇒ q90 interval

paths:
  output_dir: data/models
  model_dir: data/models/checkpoints
  feature_dir: data/models/features
  metadata_dir: data/models/metadata
  experiments_dir: experiments
