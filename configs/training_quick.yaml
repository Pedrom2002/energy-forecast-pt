# Quick/smoke-test training variant.
#
# Use this to verify the pipeline end-to-end without waiting for a full
# hyperparameter sweep. Run with:
#   python scripts/retrain.py --config configs/training_quick.yaml
#
# All values mirror configs/training.yaml except where marked "quick:".

general:
  seed: 42
  log_level: INFO
  experiment_name: retrain_quick_smoke

data:
  data_path: data/processed/processed_data.parquet
  target: consumption_mw
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  exclude_columns:
    - timestamp
    - region
    - year

feature_selection:
  enabled: false  # quick: skip permutation-importance pass
  method: permutation_importance
  correlation_threshold: 0.99
  permutation_threshold: 0.0
  max_features: null

cv:
  strategy: time_series_split
  n_folds: 3       # quick: 3 folds instead of 5
  gap: 0
  walk_forward_window_frac: 0.6

optuna:
  enabled: true
  n_trials: 3           # quick: 3 trials
  timeout_seconds: 60   # quick: 60-second hard cap
  sampler: tpe
  pruner: median
  cv_folds: 3

models:
  xgboost:
    enabled: true
    search_space:
      n_estimators:
        type: int
        low: 200
        high: 400
        step: 50
      max_depth:
        type: int
        low: 3
        high: 8
      learning_rate:
        type: float
        low: 0.05
        high: 0.3
        log: true

  lightgbm:
    enabled: true
    search_space:
      n_estimators:
        type: int
        low: 200
        high: 400
        step: 50
      max_depth:
        type: int
        low: 3
        high: 8
      learning_rate:
        type: float
        low: 0.05
        high: 0.3
        log: true
      num_leaves:
        type: int
        low: 20
        high: 80

  catboost:
    enabled: true
    search_space:
      iterations:
        type: int
        low: 200
        high: 400
        step: 50
      depth:
        type: int
        low: 3
        high: 8
      learning_rate:
        type: float
        low: 0.05
        high: 0.3
        log: true

conformal:
  method: split
  calibration_ratio: 0.5
  alpha: 0.1

paths:
  output_dir: data/models
  model_dir: data/models/checkpoints
  feature_dir: data/models/features
  metadata_dir: data/models/metadata
  experiments_dir: experiments
