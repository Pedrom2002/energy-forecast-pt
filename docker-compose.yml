version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: energy-forecast-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      # Mount models directory for hot-reload (development)
      - ./data/models:/app/data/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - energy-forecast-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: energy-forecast-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - energy-forecast-network
    profiles:
      - production

networks:
  energy-forecast-network:
    driver: bridge
