name: Keep HF Space awake

on:
  schedule:
    - cron: '0 11 * * *'   # daily at 11:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health
        run: |
          curl --fail --show-error --silent --retry 3 --retry-delay 10 --max-time 60 \
            https://pedrom02-energy-forecast-pt.hf.space/health
