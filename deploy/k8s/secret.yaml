# =============================================================================
# SECRET TEMPLATE — DO NOT COMMIT REAL VALUES
# -----------------------------------------------------------------------------
# This file is a placeholder so `kubectl apply -k deploy/k8s/` works out of the
# box in a dev cluster. In any real environment (staging/prod) you MUST NOT
# store plaintext secrets in git.
#
# Use one of:
#   - Bitnami sealed-secrets:   https://github.com/bitnami-labs/sealed-secrets
#   - External Secrets Operator: https://external-secrets.io/
#   - SOPS + age/KMS:           https://github.com/getsops/sops
#   - Your cloud provider's secret manager (AWS SM, GCP SM, Azure KV)
#
# When you adopt one of those, delete this file from the kustomization.yaml
# `resources:` list and replace it with the generated SealedSecret /
# ExternalSecret manifest.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: energy-forecast-secrets
  namespace: energy-forecast
  labels:
    app.kubernetes.io/name: energy-forecast-pt
    app.kubernetes.io/component: api
type: Opaque
stringData:
  # Redis connection string (cache / rate-limit backing store)
  REDIS_URL: "redis://:CHANGE_ME@redis.energy-forecast.svc.cluster.local:6379/0"

  # Sentry DSN for error reporting — leave empty to disable
  SENTRY_DSN: ""

  # API authentication token (if the service exposes auth'd endpoints)
  API_AUTH_TOKEN: "CHANGE_ME"

  # Upstream data provider credentials (REN / ENTSO-E / weather APIs)
  ENTSOE_API_KEY: "CHANGE_ME"
  WEATHER_API_KEY: "CHANGE_ME"
