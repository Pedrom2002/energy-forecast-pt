apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: energy-forecast-api
  namespace: energy-forecast
  labels:
    app.kubernetes.io/name: energy-forecast-pt
    app.kubernetes.io/component: api
  annotations:
    # ingress-nginx-specific — adjust if you use a different controller
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # cert-manager: automatic TLS via Let's Encrypt. Create the ClusterIssuer
    # beforehand (name must match). See README.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - energy-forecast.example.com
      secretName: energy-forecast-tls
  rules:
    - host: energy-forecast.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: energy-forecast-api
                port:
                  number: 80
