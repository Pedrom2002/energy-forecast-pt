global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: energy-forecast-pt
    environment: local

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: energy-forecast-api
    metrics_path: /metrics
    scheme: http
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - api:8000
        labels:
          service: energy-forecast-api
          component: ml-api
