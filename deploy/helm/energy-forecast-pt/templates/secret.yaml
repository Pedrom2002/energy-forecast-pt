{{- if .Values.secrets }}
# =============================================================================
# WARNING: plaintext Secret rendered from values.yaml.
# This exists so the chart installs out of the box. Do NOT use for prod —
# switch to sealed-secrets / External Secrets Operator / SOPS. See values.yaml
# and README.md for details.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "energy-forecast-pt.fullname" . }}-secrets
  labels:
    {{- include "energy-forecast-pt.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
