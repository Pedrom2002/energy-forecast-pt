apiVersion: v1
kind: Service
metadata:
  name: {{ include "energy-forecast-pt.fullname" . }}
  labels:
    {{- include "energy-forecast-pt.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "energy-forecast-pt.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
