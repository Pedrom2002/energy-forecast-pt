      // Restore dark mode preference before paint to avoid flash

        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme:dark)').matches)) {
          document.documentElement.classList.replace('light','dark');
        }
      })();
